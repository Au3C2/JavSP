name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build binaries on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Fetch tags
        run: git fetch --prune --unshallow --tags

      - name: Install poetry
        run: pipx install poetry

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'poetry'

      - name: Setup dynamic versioning
        run: poetry self add poetry-dynamic-versioning

      - name: Install dependencies
        run: poetry install

      - name: Build with Cx_Freeze
        run: poetry run python setup.py build_exe -b dist

      - name: Set VERSION variable
        shell: bash
        run: echo "VERSION=$(poetry run python tools/version.py)" >> $GITHUB_ENV

      - name: Package Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path dist\* -DestinationPath JavSP-${{ env.VERSION }}-windows-x64.zip

      - name: Package Artifacts (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          tar -czvf ../JavSP-${{ env.VERSION }}-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'macos' }}-x64.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: JavSP-${{ env.VERSION }}-${{ matrix.os }}
          path: |
            *.zip
            *.tar.gz

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract Changelog
        id: extract_changelog
        shell: bash
        run: |
          # 提取 ## [Unreleased] 到下一个 ## 之间的内容
          # 如果是正式发布，通常我们会把 Unreleased 改名为版本号，
          # 这里我们提取最顶部的更新块（假设 Unreleased 包含最新改动）
          changelog=$(sed -n '/## \[Unreleased\]/,/## v/p' CHANGELOG.md | sed '1d;$d')
          if [ -z "$changelog" ]; then
            # 备选：如果 Unreleased 为空，尝试提取第一个版本号下的内容
            changelog=$(sed -n '/## v/,/## v/p' CHANGELOG.md | sed '$d')
          fi
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract_changelog.outputs.BODY }}
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
